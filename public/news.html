<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新消息 - 御園國小</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a5c3a">
  <style>
    body{animation:pageIn .45s cubic-bezier(.4,0,.2,1) both;}
    @keyframes pageIn{from{opacity:0;}to{opacity:1;}}
    a{transition:color .2s ease,opacity .2s ease;}
    button{transition:all .2s cubic-bezier(.4,0,.2,1);}
    button:active{transform:scale(.97);}
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <a class="logo-area" href="/">
      <div class="logo-icon">御</div>
      <div class="logo-text">
        <h1 id="site-title">御園國小</h1>
        <p id="site-subtitle">學習、成長、創造未來</p>
      </div>
    </a>
    <div class="header-actions">
      <button class="btn-push-toggle" id="push-toggle-btn" onclick="togglePushSubscription()">🔕 開啟推播通知</button>
      <div class="notif-wrap">
        <button class="btn-notif" onclick="toggleNotifPanel(event)" aria-label="通知">
          🔔<span class="notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>
        <div class="notif-panel" id="notif-panel">
          <div class="notif-panel-header">
            <span>📬 最新通知</span>
          </div>
          <div class="notif-list" id="notif-list">
            <div class="notif-empty">載入中...</div>
          </div>
        </div>
      </div>
      <button class="btn-login-header" onclick="openLoginModal()">🔐 後台管理</button>
    </div>
  </div>
  <nav><ul class="main-nav" id="main-nav"><li class="nav-item"><a href="#" class="nav-link">載入中...</a></li></ul></nav>
</header>

<div class="news-page">
  <h2 class="section-title" style="margin-bottom:8px;">📢 最新消息</h2>
  <p class="section-sub">依單位分類瀏覽各項公告</p>

  <!-- 搜尋列 -->
  <div class="ann-search-bar">
    <div class="ann-search-input-wrap">
      <span class="ann-search-icon">🔍</span>
      <input type="text" id="ann-search" placeholder="搜尋公告標題或內容..." oninput="searchNews(this.value)">
      <button class="ann-search-clear" id="ann-search-clear" onclick="clearNewsSearch()" style="display:none;">✕</button>
    </div>
  </div>

  <!-- 分類標籤 -->
  <div class="dept-tabs" id="dept-tabs">
    <button class="dept-tab active" data-dept="">全部</button>
    <button class="dept-tab" data-dept="student">學務處</button>
    <button class="dept-tab" data-dept="academic">教務處</button>
    <button class="dept-tab" data-dept="general">總務處</button>
    <button class="dept-tab" data-dept="counseling">輔導室</button>
    <button class="dept-tab" data-dept="discipline">訓育組</button>
    <button class="dept-tab" data-dept="health">衛生組</button>
    <button class="dept-tab" data-dept="moral">生教組</button>
    <button class="dept-tab" data-dept="hr">人事處</button>
  </div>

  <div id="news-search-hint" style="display:none;text-align:center;font-size:.82rem;color:var(--text-light);margin-bottom:14px;"></div>

  <div class="announcement-list" id="announcement-list">
    <div class="no-announcements">載入中...</div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-grid">
    <div class="footer-col">
      <h4>御園國小</h4>
      <p class="site-address"></p>
      <p>電話：<span class="site-phone"></span></p>
      <p>信箱：<span class="site-email"></span></p>
    </div>
    <div class="footer-col">
      <h4>快速連結</h4>
      <a href="/">首頁</a>
      <a href="/news.html">最新消息</a>
      <a href="/campus.html">認識校園</a>
    </div>
  </div>
  <div class="footer-bottom"><p>© 2026 御園國小 版權所有</p></div>
</footer>

<!-- ── 公告詳情 Modal ── -->
<div class="modal-overlay" id="ann-detail-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;overflow:hidden;z-index:9999;">
  <div class="modal-box ann-detail-box">
    <button class="modal-close" onclick="closeAnnDetail()">✕</button>
    <div id="ann-detail-content">
      <div class="no-announcements">載入中...</div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="login-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;overflow:hidden;z-index:9999;">
  <div class="modal-box">
    <button class="modal-close" onclick="closeLoginModal()">✕</button>
    <div class="modal-title">🔐 後台登入</div>
    <div class="modal-subtitle">請輸入管理員帳號密碼以進入後台</div>
    <div class="msg-error" id="login-error"></div>
    <div class="form-group">
      <label for="username">帳號 *</label>
      <input type="text" id="username" placeholder="請輸入帳號" required>
    </div>
    <div class="form-group">
      <label for="password">密碼 *</label>
      <input type="password" id="password" placeholder="請輸入密碼" required>
    </div>
    <button class="btn-submit" onclick="doLogin()">登入後台</button>
    <div class="login-or">或</div>
    <button class="btn-guest" onclick="closeLoginModal()">不登入，繼續瀏覽網站</button>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
function formatDate(d) { return String(d || '').slice(0, 10) }
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

const DEPT_LABELS = {
  student:'學務處', academic:'教務處', general:'總務處',
  counseling:'輔導室', discipline:'訓育組', health:'衛生組',
  moral:'生教組', hr:'人事處'
}

let _newsAnns = []     // 目前分類下的全部公告
let _currentDept = '' // 目前選擇的分類

async function loadNews(dept = '') {
  _currentDept = dept
  const list = document.getElementById('announcement-list')
  list.innerHTML = '<div class="no-announcements">載入中...</div>'
  try {
    const url = dept ? `/api/announcements?department=${dept}` : '/api/announcements'
    const res = await fetch(url)
    const data = await res.json()
    _newsAnns = data.data || []
    // 若搜尋框有內容，套用搜尋篩選；否則顯示全部
    const kw = document.getElementById('ann-search')?.value?.trim() || ''
    if (kw) {
      applySearchFilter(kw)
    } else {
      renderNews(_newsAnns)
      document.getElementById('news-search-hint').style.display = 'none'
    }
  } catch(e) {
    list.innerHTML = '<div class="no-announcements">載入失敗，請重試</div>'
  }
}

function renderNews(anns) {
  const list = document.getElementById('announcement-list')
  if (!anns || anns.length === 0) {
    list.innerHTML = '<div class="no-announcements">此分類目前沒有公告</div>'
    return
  }
  const sevenDaysAgo = new Date(Date.now() - 7*86400000).toISOString().slice(0,10)
  list.innerHTML = anns.map(ann => {
    const dateStr = formatDate(ann.date)
    const isNew = dateStr >= sevenDaysAgo
    const deptLabel = ann.department ? `<span class="badge" style="background:var(--green-pale);color:var(--green-dark);padding:2px 8px;border-radius:4px;font-size:0.75rem;margin-left:8px;">${DEPT_LABELS[ann.department] || ann.department}</span>` : ''
    const imgThumb = ann.image_url ? `<span class="ann-has-img">🖼 含附圖</span>` : ''
    return `<div class="announcement-item ann-clickable" onclick="openAnnDetail(${ann.id})">
      <div class="ann-date">${dateStr}</div>
      <div class="ann-content">
        <div class="ann-title">${escapeHtml(ann.title)}${isNew ? '<span class="ann-new">NEW</span>' : ''}${deptLabel}</div>
        <div class="ann-text">${escapeHtml(ann.content)}</div>
        ${imgThumb}
      </div>
      <div class="ann-arrow">›</div>
    </div>`
  }).join('')
}

// ── 搜尋功能 ──────────────────────────────────────────────
function applySearchFilter(keyword) {
  const kw = keyword.toLowerCase()
  const filtered = _newsAnns.filter(a =>
    a.title.toLowerCase().includes(kw) || a.content.toLowerCase().includes(kw)
  )
  renderNews(filtered)
  const hint = document.getElementById('news-search-hint')
  hint.style.display = 'block'
  hint.textContent = filtered.length > 0
    ? `找到 ${filtered.length} 筆符合「${keyword}」的公告`
    : `找不到符合「${keyword}」的公告`
}

function searchNews(keyword) {
  const clearBtn = document.getElementById('ann-search-clear')
  if (clearBtn) clearBtn.style.display = keyword ? 'block' : 'none'
  if (!keyword.trim()) {
    clearNewsSearch()
    return
  }
  applySearchFilter(keyword)
}

function clearNewsSearch() {
  const input = document.getElementById('ann-search')
  if (input) input.value = ''
  document.getElementById('ann-search-clear').style.display = 'none'
  document.getElementById('news-search-hint').style.display = 'none'
  renderNews(_newsAnns)
}

// ── 公告詳情 Modal ────────────────────────────────────────
function openAnnDetail(id) {
  const ann = _newsAnns.find(a => Number(a.id) === Number(id))
  if (!ann) return
  const deptLabel = ann.department
    ? `<span class="detail-dept-badge">${DEPT_LABELS[ann.department] || ann.department}</span>`
    : ''
  const imgHtml = ann.image_url
    ? `<div class="detail-img"><img src="${ann.image_url}" alt="公告圖片"></div>`
    : ''
  document.getElementById('ann-detail-content').innerHTML = `
    <div class="detail-date">📅 ${formatDate(ann.date)} ${deptLabel}</div>
    <h2 class="detail-title">${escapeHtml(ann.title)}</h2>
    ${imgHtml}
    <div class="detail-body">${escapeHtml(ann.content).replace(/\\n/g,'<br>')}</div>
  `
  const modal = document.getElementById('ann-detail-modal')
  modal.style.display = 'flex'
  document.body.classList.add('modal-open')
}
function closeAnnDetail() {
  document.getElementById('ann-detail-modal').style.display = 'none'
  document.body.classList.remove('modal-open')
}
document.getElementById('ann-detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAnnDetail()
})

// 分類 tab 切換
document.getElementById('dept-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.dept-tab')
  if (!btn) return
  document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  clearNewsSearch()
  loadNews(btn.dataset.dept)
})

// 初始載入
document.addEventListener('DOMContentLoaded', () => {
  loadNews()
})
</script>
</body>
</html>
