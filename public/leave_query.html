<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生差勤系統 - 御園國小</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-dark:#1a3a6b;--blue-mid:#2563eb;--blue-light:#3b82f6;
      --blue-pale:#eff6ff;--gold:#f59e0b;--green:#16a34a;--red:#dc2626;
      --white:#fff;--gray:#f8fafc;--border:#e2e8f0;
      --text:#1e293b;--text-light:#64748b;
      --radius:12px;--shadow:0 4px 24px rgba(37,99,235,0.10);
      --font:'Noto Sans TC','Microsoft JhengHei',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--gray);color:var(--text);min-height:100vh;}

    /* ── Top Nav ── */
    .top-nav{
      background:var(--blue-dark);color:#fff;
      padding:14px 32px;display:flex;align-items:center;gap:14px;
      box-shadow:0 2px 12px rgba(0,0,0,.18);
    }
    .nav-logo{width:38px;height:38px;background:var(--gold);border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:17px;color:var(--blue-dark);flex-shrink:0;}
    .nav-title{font-size:1rem;font-weight:700;letter-spacing:1px;}
    .nav-sub{font-size:.75rem;opacity:.6;margin-left:auto;}
    .nav-back{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      color:#fff;padding:6px 16px;border-radius:20px;font-size:.82rem;cursor:pointer;text-decoration:none;transition:.2s;}
    .nav-back:hover{background:rgba(255,255,255,.22);}

    /* ── Landing ── */
    #page-landing{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:calc(100vh - 60px);padding:40px 20px;text-align:center;
    }
    .landing-card{
      background:var(--white);border-radius:20px;padding:56px 48px;
      max-width:500px;width:100%;
      box-shadow:0 8px 48px rgba(37,99,235,.13);
    }
    .landing-icon{font-size:4rem;margin-bottom:20px;line-height:1;}
    .landing-title{font-size:1.9rem;font-weight:700;color:var(--blue-dark);margin-bottom:8px;
      font-family:'Noto Serif TC',serif;letter-spacing:2px;}
    .landing-sub{color:var(--text-light);font-size:.95rem;margin-bottom:36px;line-height:1.7;}
    .landing-features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:36px;}
    .feature-item{background:var(--blue-pale);border-radius:10px;padding:14px 12px;font-size:.85rem;color:var(--blue-dark);}
    .feature-item .fi{font-size:1.3rem;display:block;margin-bottom:4px;}
    .btn-start{
      background:linear-gradient(135deg,var(--blue-mid),var(--blue-dark));
      color:#fff;border:none;padding:16px 48px;border-radius:40px;
      font-size:1.05rem;font-weight:700;cursor:pointer;
      box-shadow:0 4px 20px rgba(37,99,235,.35);transition:.2s;
      width:100%;letter-spacing:1px;
    }
    .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(37,99,235,.4);}

    /* ── Main App ── */
    #page-app{display:none;padding:28px 20px 80px;}
    .app-wrap{max-width:820px;margin:0 auto;}

    /* ── Tabs ── */
    .tab-bar{display:flex;gap:0;background:var(--white);border-radius:12px;
      padding:6px;margin-bottom:24px;box-shadow:var(--shadow);}
    .tab-btn{flex:1;padding:12px;border:none;background:none;border-radius:8px;
      font-size:.92rem;font-weight:600;color:var(--text-light);cursor:pointer;transition:.2s;}
    .tab-btn.active{background:var(--blue-mid);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}

    /* ── Card ── */
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:28px;margin-bottom:20px;}
    .card-title{font-size:1.1rem;font-weight:700;color:var(--blue-dark);
      margin-bottom:20px;display:flex;align-items:center;gap:8px;
      padding-bottom:14px;border-bottom:2px solid var(--blue-pale);}

    /* ── Form ── */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-grid .full{grid-column:1/-1;}
    .fg{display:flex;flex-direction:column;gap:6px;}
    .fg label{font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:.3px;}
    .fg label .req{color:var(--red);margin-left:2px;}
    .fg input,.fg select,.fg textarea{
      padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
      font-size:.92rem;font-family:var(--font);outline:none;transition:.2s;
      background:var(--white);color:var(--text);
    }
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
    .fg textarea{resize:vertical;min-height:80px;}

    .btn-submit{
      width:100%;margin-top:20px;padding:14px;border:none;border-radius:10px;
      background:linear-gradient(135deg,var(--blue-mid),var(--blue-dark));
      color:#fff;font-size:1rem;font-weight:700;cursor:pointer;
      box-shadow:0 4px 16px rgba(37,99,235,.3);transition:.2s;
    }
    .btn-submit:hover{transform:translateY(-1px);}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    /* ── Alert ── */
    .alert{padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:16px;display:none;}
    .alert.show{display:flex;align-items:flex-start;gap:8px;}
    .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
    .alert-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
    .alert-info{background:var(--blue-pale);color:var(--blue-dark);border:1px solid #bfdbfe;}

    /* ── 查詢結果 ── */
    .query-bar{display:flex;gap:10px;margin-bottom:20px;}
    .query-bar input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
      font-size:.92rem;font-family:var(--font);outline:none;transition:.2s;}
    .query-bar input:focus{border-color:var(--blue-light);}
    .btn-query{background:var(--blue-mid);color:#fff;border:none;padding:10px 22px;
      border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
    .btn-query:hover{background:var(--blue-dark);}

    .leave-card{
      border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;
      position:relative;transition:.2s;
    }
    .leave-card:hover{border-color:var(--blue-light);box-shadow:0 2px 12px rgba(37,99,235,.08);}
    .lc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
    .lc-type{font-weight:700;font-size:.95rem;color:var(--blue-dark);}
    .status-badge{
      display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;
    }
    .status-待審核{background:#fef9c3;color:#854d0e;}
    .status-已批准{background:#dcfce7;color:#15803d;}
    .status-已駁回{background:#fee2e2;color:#b91c1c;}
    .lc-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;font-size:.83rem;color:var(--text-light);}
    .lc-info span{display:flex;align-items:center;gap:4px;}
    .lc-reason{margin-top:8px;font-size:.85rem;color:var(--text-light);
      background:var(--gray);padding:8px 12px;border-radius:6px;}
    .lc-review-time{margin-top:6px;font-size:.78rem;color:var(--text-light);}
    .no-result{text-align:center;padding:40px;color:var(--text-light);font-size:.9rem;}

    /* ── 右下查詢按鈕 ── */
    .fab-query{
      position:fixed;right:24px;bottom:24px;z-index:100;
      background:linear-gradient(135deg,var(--gold),#f97316);
      color:#fff;border:none;border-radius:50px;padding:14px 22px;
      font-size:.9rem;font-weight:700;cursor:pointer;
      box-shadow:0 4px 20px rgba(245,158,11,.4);transition:.2s;
      display:flex;align-items:center;gap:8px;
    }
    .fab-query:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,.5);}

    /* ── Query Modal ── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal-box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:480px;
      box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:1.1rem;font-weight:700;color:var(--blue-dark);margin-bottom:16px;
      display:flex;align-items:center;gap:8px;}
    .modal-close{margin-left:auto;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-light);}

    @media(max-width:768px){
      .top-nav{padding:12px 14px;}
      .nav-title{font-size:.88rem;}
    }
    @media(max-width:600px){
      .form-grid{grid-template-columns:1fr;}
      .form-grid .full{grid-column:1;}
      .landing-card{padding:28px 18px;}
      .landing-features{grid-template-columns:1fr 1fr;}
      .landing-title{font-size:1.5rem;}
      #page-app{padding:14px 10px 100px;}
      .card{padding:18px 14px;}
      .tab-bar{padding:4px;}
      .tab-btn{font-size:.82rem;padding:10px 8px;}
      .query-bar{flex-direction:column;}
      .query-bar input{width:100%;}
      .btn-query{width:100%;}
      .modal-box{margin:0 10px;padding:22px 16px;}
      .fab-query{right:14px;bottom:14px;padding:12px 16px;font-size:.82rem;}
      .lc-info{grid-template-columns:1fr;}
    }
    @media(max-width:400px){
      .landing-features{grid-template-columns:1fr;}
    }
  </style>
  <style>
    body{animation:pageIn .45s cubic-bezier(.4,0,.2,1) both;}
    @keyframes pageIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    a{transition:color .2s ease,opacity .2s ease;}
    button{transition:all .2s cubic-bezier(.4,0,.2,1);}
    button:active{transform:scale(.97);}
  </style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="nav-logo">御</div>
  <div class="nav-title">學生差勤系統</div>
  <a href="/" class="nav-back">← 返回首頁</a>
</nav>

<!-- ── Landing Page ── -->
<div id="page-landing">
  <div class="landing-card">
    <div class="landing-icon">📋</div>
    <div class="landing-title">學生差勤系統</div>
    <div class="landing-sub">御園國小線上請假平台<br>快速填寫請假申請，即時查詢審核狀態</div>
    <div class="landing-features">
      <div class="feature-item"><span class="fi">📝</span>線上請假申請</div>
      <div class="feature-item"><span class="fi">🔍</span>即時查詢狀態</div>
      <div class="feature-item"><span class="fi">✅</span>老師線上審核</div>
      <div class="feature-item"><span class="fi">📅</span>假期記錄管理</div>
    </div>
    <button class="btn-start" onclick="startApp()">開始使用 →</button>
  </div>
</div>

<!-- ── Main App ── -->
<div id="page-app">
  <div class="app-wrap">

    <!-- Tab 切換 -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-btn-form" onclick="switchTab('form')">📝 請假申請</button>
      <button class="tab-btn" id="tab-btn-query" onclick="switchTab('query')">🔍 查詢狀態</button>
    </div>

    <!-- ── 請假申請表單 ── -->
    <div id="tab-form">
      <div class="card">
        <div class="card-title">📝 填寫請假申請</div>
        <div class="alert alert-success" id="form-success">
          <span>✅</span><span id="form-success-msg"></span>
        </div>
        <div class="alert alert-error" id="form-error">
          <span>⚠️</span><span id="form-error-msg"></span>
        </div>

        <div class="form-grid">
          <div class="fg">
            <label>學號<span class="req">*</span></label>
            <input type="number" id="f-sid" placeholder="請輸入學號">
          </div>
          <div class="fg">
            <label>姓名<span class="req">*</span></label>
            <input type="text" id="f-name" placeholder="請輸入姓名">
          </div>
          <div class="fg">
            <label>班級<span class="req">*</span></label>
            <select id="f-class">
              <option value="">請選擇班級</option>
            </select>
          </div>
          <div class="fg">
            <label>假別<span class="req">*</span></label>
            <select id="f-type">
              <option value="">請選擇假別</option>
              <option value="病假">病假</option>
              <option value="事假">事假</option>
              <option value="喪假">喪假</option>
              <option value="公假">公假</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="fg">
            <label>開始日期<span class="req">*</span></label>
            <input type="date" id="f-start">
          </div>
          <div class="fg">
            <label>結束日期<span class="req">*</span></label>
            <input type="date" id="f-end">
          </div>
          <div class="fg full">
            <label>請假原因<span class="req">*</span></label>
            <textarea id="f-reason" placeholder="請簡述請假原因..."></textarea>
          </div>
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitLeave()">📤 送出請假申請</button>
      </div>
    </div>

    <!-- ── 查詢狀態 ── -->
    <div id="tab-query" style="display:none;">
      <div class="card">
        <div class="card-title">🔍 查詢請假狀態</div>
        <div class="alert alert-info show">
          <span>ℹ️</span><span>輸入學號即可查詢所有請假紀錄與審核狀態</span>
        </div>
        <div class="query-bar">
          <input type="number" id="q-sid" placeholder="請輸入學號" onkeydown="if(event.key==='Enter')queryLeave()">
          <button class="btn-query" onclick="queryLeave()">查詢</button>
        </div>
        <div id="query-result"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── 右下角查詢 FAB ── -->
<button class="fab-query" id="fab-btn" style="display:none;" onclick="openQueryModal()">
  🔍 查詢狀態
</button>

<!-- ── 查詢 Modal ── -->
<div class="modal-bg" id="query-modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;align-items:center;justify-content:center;overflow:hidden;">
  <div class="modal-box">
    <div class="modal-title">
      🔍 快速查詢請假狀態
      <button class="modal-close" onclick="closeQueryModal()">✕</button>
    </div>
    <div class="query-bar" style="margin-bottom:16px;">
      <input type="number" id="modal-sid" placeholder="請輸入學號" onkeydown="if(event.key==='Enter')modalQuery()">
      <button class="btn-query" onclick="modalQuery()">查詢</button>
    </div>
    <div id="modal-result"></div>
  </div>
</div>

<script>
// ── 建立班級選單 ──────────────────────────────────────────
(function buildClasses(){
  const sel = document.getElementById('f-class')
  for(let g=1; g<=6; g++){
    for(let c=1; c<=7; c++){
      const opt = document.createElement('option')
      opt.value = `${g}年${c}班`
      opt.textContent = `${g}年${c}班`
      sel.appendChild(opt)
    }
  }
})()

// 預設日期
const today = new Date().toISOString().slice(0,10)
document.getElementById('f-start').value = today
document.getElementById('f-end').value   = today

// ── 頁面切換 ──────────────────────────────────────────────
function startApp(){
  document.getElementById('page-landing').style.display = 'none'
  document.getElementById('page-app').style.display = 'block'
  document.getElementById('fab-btn').style.display = 'flex'
}

function switchTab(tab){
  document.getElementById('tab-form').style.display  = tab==='form'  ? 'block' : 'none'
  document.getElementById('tab-query').style.display = tab==='query' ? 'block' : 'none'
  document.getElementById('tab-btn-form').classList.toggle('active',  tab==='form')
  document.getElementById('tab-btn-query').classList.toggle('active', tab==='query')
}

// ── 送出請假 ──────────────────────────────────────────────
async function submitLeave(){
  hideAlerts()
  const student_id = document.getElementById('f-sid').value.trim()
  const name       = document.getElementById('f-name').value.trim()
  const cls        = document.getElementById('f-class').value
  const leave_type = document.getElementById('f-type').value
  const start_date = document.getElementById('f-start').value
  const end_date   = document.getElementById('f-end').value
  const reason     = document.getElementById('f-reason').value.trim()

  if(!student_id||!name||!cls||!leave_type||!start_date||!end_date||!reason){
    showError('請填寫所有必填欄位'); return
  }
  if(end_date < start_date){ showError('結束日期不能早於開始日期'); return }

  const btn = document.getElementById('btn-submit')
  btn.disabled = true; btn.textContent = '送出中...'

  try {
    const res = await fetch('/api/leaves', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({student_id,name,class:cls,leave_type,start_date,end_date,reason})
    })
    const data = await res.json()
    if(data.success){
      showSuccess(`請假申請已送出！申請編號：#${data.id}，請記下學號以便查詢審核狀態。`)
      document.getElementById('f-sid').value=''
      document.getElementById('f-name').value=''
      document.getElementById('f-class').value=''
      document.getElementById('f-type').value=''
      document.getElementById('f-reason').value=''
    } else { showError(data.message||'送出失敗，請稍後再試') }
  } catch(e){ showError('網路錯誤，請稍後再試') }
  finally { btn.disabled=false; btn.textContent='📤 送出請假申請' }
}

// ── 查詢 ──────────────────────────────────────────────────
function fmtDate(d){ return String(d||'').slice(0,10) }
function fmtDT(d){
  if(!d) return '—'
  const dt = new Date(d)
  return dt.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
}

function renderLeaves(data, container){
  if(!data||data.length===0){
    container.innerHTML='<div class="no-result">🔍 查無請假紀錄</div>'; return
  }
  container.innerHTML = data.map(r=>`
    <div class="leave-card">
      <div class="lc-header">
        <div class="lc-type">【${r.leave_type}】${fmtDate(r.start_date)} ～ ${fmtDate(r.end_date)}</div>
        <span class="status-badge status-${r.status}">${r.status}</span>
      </div>
      <div class="lc-info">
        <span>🎓 ${r.name} | ${r.class}</span>
        <span>🆔 申請編號：#${r.id}</span>
        <span>📅 申請時間：${fmtDT(r.created_at)}</span>
        ${r.review_time?`<span>✅ 審核時間：${fmtDT(r.review_time)}</span>`:''}
      </div>
      <div class="lc-reason">📝 原因：${r.reason}</div>
    </div>`).join('')
}

async function queryLeave(){
  const sid = document.getElementById('q-sid').value.trim()
  const container = document.getElementById('query-result')
  if(!sid){ container.innerHTML='<div class="no-result">請輸入學號</div>'; return }
  container.innerHTML='<div class="no-result">查詢中...</div>'
  try {
    const res = await fetch(`/api/leaves/query?student_id=${sid}`)
    const data = await res.json()
    renderLeaves(data.data, container)
  } catch(e){ container.innerHTML='<div class="no-result">查詢失敗</div>' }
}

// ── Modal 查詢 ────────────────────────────────────────────
function openQueryModal(){ const m=document.getElementById('query-modal'); m.style.display='flex'; }
function closeQueryModal(){ document.getElementById('query-modal').style.display='none'; }
async function modalQuery(){
  const sid = document.getElementById('modal-sid').value.trim()
  const container = document.getElementById('modal-result')
  if(!sid){ container.innerHTML='<div class="no-result">請輸入學號</div>'; return }
  container.innerHTML='<div class="no-result">查詢中...</div>'
  try {
    const res = await fetch(`/api/leaves/query?student_id=${sid}`)
    const data = await res.json()
    renderLeaves(data.data, container)
  } catch(e){ container.innerHTML='<div class="no-result">查詢失敗</div>' }
}
document.getElementById('query-modal').addEventListener('click', e=>{
  if(e.target===document.getElementById('query-modal')) closeQueryModal()
})

// ── Alert helpers ─────────────────────────────────────────
function showError(msg){
  document.getElementById('form-error-msg').textContent=msg
  document.getElementById('form-error').classList.add('show')
  document.getElementById('form-error').scrollIntoView({behavior:'smooth',block:'nearest'})
}
function showSuccess(msg){
  document.getElementById('form-success-msg').textContent=msg
  document.getElementById('form-success').classList.add('show')
  document.getElementById('form-success').scrollIntoView({behavior:'smooth',block:'nearest'})
}
function hideAlerts(){
  document.getElementById('form-error').classList.remove('show')
  document.getElementById('form-success').classList.remove('show')
}
</script>
</body>
</html>
