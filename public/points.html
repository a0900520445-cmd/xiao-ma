<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生點數查詢 - 御園國小</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#161a1f;--ink-soft:#3a4149;--paper:#fafaf8;--panel:#ffffff;
      --line:#e4e2dc;--line-soft:#edebE5;
      --accent:#2a5c4a;--accent-soft:#e8f0ec;
      --gold:#a8823c;
      --mono:'IBM Plex Mono',monospace;
      --serif:'Newsreader',serif;
      --sans:'Noto Sans TC',sans-serif;
      --radius:10px;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{overflow-x:hidden;width:100%;}
    body{
      font-family:var(--sans);background:var(--paper);color:var(--ink);
      min-height:100vh;width:100%;overflow-x:hidden;
      animation:pageIn .4s var(--ease) both;
    }
    @keyframes pageIn{from{opacity:0;}to{opacity:1;}}

    /* ── Nav ── */
    .top-nav{
      border-bottom:1px solid var(--line);
      padding:18px 40px;
      display:flex;align-items:center;gap:14px;
      background:var(--panel);
    }
    .nav-mark{
      width:34px;height:34px;border-radius:6px;
      background:var(--ink);color:var(--paper);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--serif);font-weight:600;font-size:16px;
      flex-shrink:0;
    }
    .nav-title{font-size:.92rem;font-weight:600;letter-spacing:.3px;color:var(--ink);}
    .nav-sub{font-family:var(--mono);font-size:.72rem;color:var(--ink-soft);opacity:.6;margin-left:2px;}
    .nav-back{
      margin-left:auto;font-size:.82rem;color:var(--ink-soft);
      text-decoration:none;padding:7px 16px;border:1px solid var(--line);
      border-radius:20px;transition:all .2s var(--ease);
    }
    .nav-back:hover{border-color:var(--ink);color:var(--ink);}

    /* ── Layout ── */
    .page{
      max-width:1080px;margin:0 auto;
      padding:64px 40px 100px;
    }

    /* ── Search Hero ── */
    .search-hero{
      text-align:center;
      margin-bottom:56px;
    }
    .eyebrow{
      font-family:var(--mono);font-size:.74rem;letter-spacing:2px;
      color:var(--accent);text-transform:uppercase;margin-bottom:14px;
    }
    .search-hero h1{
      font-family:var(--serif);font-size:2.6rem;font-weight:500;
      color:var(--ink);line-height:1.25;letter-spacing:-.5px;
      margin-bottom:14px;
    }
    .search-hero p{
      font-size:.98rem;color:var(--ink-soft);line-height:1.7;
      max-width:440px;margin:0 auto 36px;
    }

    .search-box{
      display:flex;gap:10px;max-width:440px;margin:0 auto;
    }
    .search-box input{
      flex:1;
      font-family:var(--mono);font-size:1.05rem;letter-spacing:1px;
      padding:16px 20px;
      border:1.5px solid var(--line);border-radius:8px;
      background:var(--panel);color:var(--ink);
      outline:none;transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
      text-align:center;
    }
    .search-box input::placeholder{color:#b8b4aa;letter-spacing:.5px;}
    .search-box input:focus{
      border-color:var(--ink);
      box-shadow:0 0 0 3px rgba(22,26,31,.06);
    }
    .search-box button{
      font-family:var(--sans);font-weight:600;font-size:.92rem;
      padding:16px 28px;border:none;border-radius:8px;
      background:var(--ink);color:var(--paper);
      cursor:pointer;transition:all .2s var(--ease);
      white-space:nowrap;
    }
    .search-box button:hover{background:var(--accent);}
    .search-box button:active{transform:scale(.97);}
    .search-box button:disabled{opacity:.5;cursor:default;}

    .search-error{
      max-width:440px;margin:14px auto 0;
      font-size:.85rem;color:#b3433a;
      display:none;
    }
    .search-error.show{display:block;animation:shake .35s var(--ease);}
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      25%{transform:translateX(-4px);}
      75%{transform:translateX(4px);}
    }

    /* ── Result ── */
    .result{ display:none; }
    .result.show{ display:block; animation:resultIn .4s var(--ease) both; }
    @keyframes resultIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

    /* 學生資訊條 */
    .student-bar{
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:12px;
      padding:20px 28px;
      border:1px solid var(--line);border-radius:var(--radius);
      background:var(--panel);
      margin-bottom:24px;
    }
    .student-identity{display:flex;align-items:center;gap:16px;}
    .student-avatar{
      width:48px;height:48px;border-radius:50%;
      background:var(--ink);color:var(--paper);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--serif);font-size:1.2rem;font-weight:500;
      flex-shrink:0;
    }
    .student-name{font-size:1.1rem;font-weight:700;color:var(--ink);}
    .student-meta{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);margin-top:2px;}
    .btn-new-search{
      font-size:.82rem;color:var(--ink-soft);background:none;
      border:1px solid var(--line);border-radius:20px;padding:7px 16px;
      cursor:pointer;transition:all .2s var(--ease);
    }
    .btn-new-search:hover{border-color:var(--ink);color:var(--ink);}

    /* 總點數面板 */
    .total-panel{
      background:var(--ink);color:var(--paper);
      border-radius:var(--radius);
      padding:48px 40px;
      text-align:center;
      margin-bottom:28px;
      position:relative;
      overflow:hidden;
    }
    .total-panel::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 60% 80% at 50% -20%, rgba(255,255,255,.06), transparent 70%);
      pointer-events:none;
    }
    .total-label{
      font-family:var(--mono);font-size:.74rem;letter-spacing:2px;
      text-transform:uppercase;opacity:.55;margin-bottom:14px;
      position:relative;
    }
    .total-number{
      font-family:var(--serif);font-weight:500;
      font-size:5rem;line-height:1;letter-spacing:-2px;
      position:relative;
    }
    .total-number .unit{font-size:1.4rem;font-family:var(--sans);font-weight:500;margin-left:8px;opacity:.7;}
    .total-sub{
      font-size:.85rem;opacity:.55;margin-top:14px;position:relative;
    }

    /* 歷史記錄 */
    .history-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;
    }
    .history-header h2{
      font-family:var(--serif);font-size:1.3rem;font-weight:500;color:var(--ink);
    }
    .history-count{
      font-family:var(--mono);font-size:.78rem;color:var(--ink-soft);
    }

    .record-list{
      border:1px solid var(--line);border-radius:var(--radius);
      overflow:hidden;background:var(--panel);
    }
    .record-item{
      display:flex;align-items:center;gap:16px;
      padding:18px 24px;
      border-bottom:1px solid var(--line-soft);
      transition:background .15s ease;
    }
    .record-item:last-child{border-bottom:none;}
    .record-item:hover{background:#fbfbf9;}
    .record-date{
      font-family:var(--mono);font-size:.78rem;color:var(--ink-soft);
      min-width:88px;flex-shrink:0;
    }
    .record-reason{
      flex:1;font-size:.92rem;color:var(--ink);min-width:0;
    }
    .record-reason.empty{color:var(--ink-soft);font-style:italic;}
    .record-points{
      font-family:var(--mono);font-size:1.05rem;font-weight:600;
      flex-shrink:0;min-width:60px;text-align:right;
    }
    .record-points.positive{color:var(--accent);}
    .record-points.negative{color:#b3433a;}

    .no-records{
      text-align:center;padding:48px 24px;color:var(--ink-soft);font-size:.9rem;
    }

    /* ── Loading ── */
    .loading-state{
      display:none;text-align:center;padding:60px 20px;color:var(--ink-soft);
    }
    .loading-state.show{display:block;}
    .loading-dots{display:flex;gap:7px;justify-content:center;margin-bottom:14px;}
    .loading-dots span{
      width:7px;height:7px;border-radius:50%;background:var(--ink);
      animation:dotPulse 1s var(--d,0s) ease-in-out infinite;
    }
    @keyframes dotPulse{0%,100%{opacity:.25;}50%{opacity:1;}}

    /* ── Footer hint ── */
    .footer-hint{
      text-align:center;margin-top:64px;
      font-size:.8rem;color:var(--ink-soft);opacity:.6;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .top-nav{padding:14px 20px;}
      .page{padding:40px 20px 64px;}
      .search-hero h1{font-size:2rem;}
      .search-box{flex-direction:column;}
      .total-panel{padding:36px 24px;}
      .total-number{font-size:3.6rem;}
      .student-bar{padding:18px 20px;}
      .record-item{padding:15px 18px;gap:10px;}
      .record-date{min-width:72px;font-size:.72rem;}
    }
    @media (max-width: 420px) {
      .nav-sub{display:none;}
      .total-number{font-size:3rem;}
      .record-reason{font-size:.85rem;}
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-mark">御</div>
  <span class="nav-title">御園國小</span>
  <span class="nav-sub">／ 學生點數查詢</span>
  <a href="/" class="nav-back">← 返回首頁</a>
</nav>

<div class="page">

  <!-- 搜尋區 -->
  <div class="search-hero">
    <div class="eyebrow">Student Points Lookup</div>
    <h1>查詢你的點數</h1>
    <p>輸入學號即可查看目前累積點數與完整歷史記錄</p>
    <div class="search-box">
      <input type="text" id="sid-input" placeholder="輸入學號" inputmode="numeric" onkeydown="if(event.key==='Enter')queryPoints()">
      <button id="query-btn" onclick="queryPoints()">查詢</button>
    </div>
    <div class="search-error" id="search-error"></div>
  </div>

  <!-- 載入中 -->
  <div class="loading-state" id="loading-state">
    <div class="loading-dots">
      <span style="--d:0s"></span><span style="--d:.15s"></span><span style="--d:.3s"></span>
    </div>
    <div>查詢中...</div>
  </div>

  <!-- 查詢結果 -->
  <div class="result" id="result">

    <div class="student-bar">
      <div class="student-identity">
        <div class="student-avatar" id="student-avatar">生</div>
        <div>
          <div class="student-name" id="student-name">—</div>
          <div class="student-meta" id="student-meta">—</div>
        </div>
      </div>
      <button class="btn-new-search" onclick="resetSearch()">重新查詢</button>
    </div>

    <div class="total-panel">
      <div class="total-label">目前累積點數</div>
      <div class="total-number"><span id="total-points">0</span><span class="unit">點</span></div>
      <div class="total-sub" id="total-sub">共 0 筆記錄</div>
    </div>

    <div class="history-header">
      <h2>歷史記錄</h2>
      <span class="history-count" id="history-count"></span>
    </div>

    <div class="record-list" id="record-list">
      <div class="no-records">尚無記錄</div>
    </div>

  </div>

  <div class="footer-hint">若查詢結果有誤，請聯絡老師或學務處確認</div>

</div>

<script>
function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
function fmtDate(d) {
  const dt = new Date(d)
  return dt.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' })
}

function animateNumber(el, to, duration = 800) {
  const start = performance.now()
  const from = 0
  const update = (now) => {
    const progress = Math.min((now - start) / duration, 1)
    const eased = 1 - Math.pow(1 - progress, 3)
    el.textContent = Math.round(from + (to - from) * eased).toLocaleString()
    if (progress < 1) requestAnimationFrame(update)
    else el.textContent = to.toLocaleString()
  }
  requestAnimationFrame(update)
}

async function queryPoints() {
  const sid = document.getElementById('sid-input').value.trim()
  const errEl = document.getElementById('search-error')
  const btn = document.getElementById('query-btn')
  errEl.classList.remove('show')

  if (!sid) {
    errEl.textContent = '請輸入學號'
    errEl.classList.add('show')
    return
  }

  btn.disabled = true
  btn.textContent = '查詢中'
  document.getElementById('result').classList.remove('show')
  document.getElementById('loading-state').classList.add('show')

  try {
    const res = await fetch(`/api/points/query?student_id=${encodeURIComponent(sid)}`)
    const data = await res.json()

    document.getElementById('loading-state').classList.remove('show')

    if (!data.success) {
      errEl.textContent = data.message || '查無此學號的資料'
      errEl.classList.add('show')
      return
    }

    renderResult(data)
  } catch (e) {
    document.getElementById('loading-state').classList.remove('show')
    errEl.textContent = '查詢失敗，請稍後再試'
    errEl.classList.add('show')
  } finally {
    btn.disabled = false
    btn.textContent = '查詢'
  }
}

function renderResult(data) {
  const { student, total, records } = data

  document.getElementById('student-name').textContent = student.name
  document.getElementById('student-meta').textContent = `學號 ${student.student_id} ／ ${student.class_name}`
  document.getElementById('student-avatar').textContent = student.name.slice(-1)

  const totalEl = document.getElementById('total-points')
  animateNumber(totalEl, total)
  document.getElementById('total-sub').textContent = `共 ${records.length} 筆記錄`
  document.getElementById('history-count').textContent = `${records.length} 筆`

  const list = document.getElementById('record-list')
  if (records.length === 0) {
    list.innerHTML = '<div class="no-records">尚無加點記錄</div>'
  } else {
    list.innerHTML = records.map(r => {
      const isPositive = r.points >= 0
      const sign = isPositive ? '+' : ''
      const reasonHtml = r.reason
        ? `<span class="record-reason">${escapeHtml(r.reason)}</span>`
        : `<span class="record-reason empty">未填寫原因</span>`
      return `
        <div class="record-item">
          <span class="record-date">${fmtDate(r.created_at)}</span>
          ${reasonHtml}
          <span class="record-points ${isPositive ? 'positive' : 'negative'}">${sign}${r.points}</span>
        </div>`
    }).join('')
  }

  document.getElementById('result').classList.add('show')
}

function resetSearch() {
  document.getElementById('result').classList.remove('show')
  document.getElementById('sid-input').value = ''
  document.getElementById('search-error').classList.remove('show')
  document.getElementById('sid-input').focus()
  window.scrollTo({ top: 0, behavior: 'smooth' })
}
</script>
</body>
</html>
