<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果大戰爭</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 登入 -->
<div id="loginPage" class="page">
    <div class="card">
        <h1>🍓 水果大戰爭</h1>

        <input id="playerName" placeholder="輸入名字">
        <input id="googleAccount" placeholder="Google帳號">

        <button onclick="enterLobby()">開始遊戲</button>
    </div>
</div>

<!-- 大廳 -->
<div id="lobbyPage" class="page hidden">
    <h1>遊戲大廳</h1>

    <div>華幣：<span id="coins">100</span></div>

    <button onclick="startSingle()">單機模式</button>
    <button onclick="openMulti()">多人模式</button>
    <button onclick="openShop()">商店</button>
    <button onclick="openDaily()">每日任務</button>
</div>

<!-- 配對 -->
<div id="matchPage" class="page hidden">
    <h1>配對中...</h1>
    <div id="countdown">5</div>
</div>

<!-- 選角 -->
<div id="characterPage" class="page hidden">
    <h1>選擇角色</h1>

    <button onclick="selectCharacter('芒妹')">芒妹</button>
    <button onclick="selectCharacter('桃妹')">桃妹</button>
    <button onclick="selectCharacter('茶妹')">茶妹</button>
    <button onclick="selectCharacter('米米')">米米</button>
    <button onclick="selectCharacter('檸檬酸')">檸檬酸</button>

    <button onclick="confirmCharacter()">確定</button>
</div>

<!-- 戰鬥 -->
<div id="gamePage" class="page hidden">

    <h2 id="playerCharacter"></h2>
    <h2 id="enemyCharacter"></h2>

    <div>
        <div>玩家HP</div>
        <div id="playerHpBar" class="bar"></div>

        <div>敵人HP</div>
        <div id="enemyHpBar" class="bar"></div>
    </div>

    <button onclick="attack()">攻擊</button>

    <div id="upgradeArea" class="hidden">
        <button onclick="upgradeSkill()">升級技能</button>
    </div>
</div>

<!-- 每日 -->
<div id="dailyPage" class="page hidden">
    <h1>每日任務</h1>

    <button onclick="claimDaily(1)">30</button>
    <button onclick="claimDaily(2)">40</button>
    <button onclick="claimDaily(3)">50</button>
    <button onclick="claimDaily(4)">60</button>
    <button onclick="claimDaily(5)">70</button>
    <button onclick="claimDaily(6)">80</button>
    <button onclick="claimDaily(7)">100</button>

    <button onclick="backLobby()">返回</button>
</div>

<script src="game.js"></script>
</body>
</html>
