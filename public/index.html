<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>小麻將</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- BG -->
<div class="bg-layer bg-stars"></div>
<div class="bg-layer bg-grad"></div>
<div class="bg-layer bg-gl"></div>
<div class="bg-layer bg-gr"></div>
<div class="bg-layer bg-pat"></div>

<div class="conn-status err" id="conn-status">○ 連線中…</div>
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ══ LOGIN ══════════════════════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-tiles">
    <div class="deco-tile r">中</div>
    <div class="deco-tile k">🀇</div>
    <div class="deco-tile g">發</div>
    <div class="deco-tile k">🀙</div>
    <div class="deco-tile r">東</div>
  </div>
  <div class="logo-wrap">
    <div class="logo-main">小麻將</div>
    <div class="logo-line"></div>
    <div class="logo-en">XIAO MAHJONG · PREMIUM</div>
  </div>
  <div class="login-card">
    <div class="card-title">✦ 歡 迎 入 桌 ✦</div>
    <div class="form-group">
      <label class="form-label" for="login-name-input">玩家名稱</label>
      <input class="form-input" id="login-name-input" type="text" placeholder="請輸入您的名稱" maxlength="12" autocomplete="off">
    </div>
    <button class="btn-gold" id="login-btn">進 入 遊 戲</button>
  </div>
</div>

<!-- ══ MAIN LOBBY ═════════════════════════════════════════════ -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <div class="topbar-logo">小麻將</div>
    <div class="topbar-r">
      <div class="qi-pill"><span class="qi-icon">🪙</span><span class="qi-val">1200</span><span class="qi-lbl">琪幣</span></div>
      <div class="av player-av-char">玩</div>
    </div>
  </div>
  <div class="main-banner">
    <div class="banner-av player-av-char" style="width:52px;height:52px;font-size:22px">玩</div>
    <div>
      <div class="banner-greet">歡迎回來</div>
      <div class="banner-name player-name-display">玩家</div>
      <div class="banner-sub">今日已簽到・連線對局中</div>
    </div>
  </div>
  <div class="main-grid">
    <div class="gcard full jade" id="btn-go-friend">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="gcard-icon j">🀅</div>
        <div><div class="gcard-name j">好 友 桌</div><div class="gcard-desc">建立私人房間，邀請好友一起對局</div></div>
        <div style="margin-left:auto;font-size:30px;opacity:.25">›</div>
      </div>
    </div>
    <div class="gcard" id="btn-go-quick">
      <div class="gcard-icon">⚡</div>
      <div class="gcard-name">快速配對</div>
      <div class="gcard-desc">系統自動配對玩家，即時開局</div>
    </div>
    <div class="gcard" id="btn-go-quest">
      <div class="ribbon">NEW</div>
      <div class="gcard-icon">📋</div>
      <div class="gcard-name">每日任務</div>
      <div class="gcard-desc">完成任務領取琪幣獎勵</div>
    </div>
    <div class="gcard" id="btn-go-leader">
      <div class="gcard-icon">🏆</div>
      <div class="gcard-name">排 行 榜</div>
      <div class="gcard-desc">全服勝場與琪幣排名</div>
    </div>
    <div class="gcard" id="btn-replay">
      <div class="gcard-icon">🎴</div>
      <div class="gcard-name">牌局回放</div>
      <div class="gcard-desc">回顧精彩對局（即將上線）</div>
    </div>
  </div>
</div>

<!-- ══ QUICK MATCH ════════════════════════════════════════════ -->
<div class="screen" id="screen-quick">
  <div class="subhdr">
    <button class="btn-ghost" data-back="screen-main">← 返回</button>
    <div class="sub-title">⚡ 快速配對</div>
  </div>
  <div class="quick-body">
    <div id="qm-mode-sel" style="width:100%;display:flex;flex-direction:column;gap:12px">
      <div class="sec-card">
        <div class="sec-lbl">選擇模式</div>
        <div style="display:flex;gap:10px">
          <button class="qm-mode-btn btn-ghost" data-mode="2p" style="flex:1;padding:16px;font-size:15px;letter-spacing:2px">二人麻將<br><small style="font-size:11px;opacity:.6">香港麻將</small></button>
          <button class="qm-mode-btn btn-ghost" data-mode="4p" style="flex:1;padding:16px;font-size:15px;letter-spacing:2px">四人麻將<br><small style="font-size:11px;opacity:.6">普通規則</small></button>
        </div>
      </div>
      <button class="btn-jade" id="qm-start-btn" disabled>開始配對</button>
    </div>
    <div id="queue-waiting" style="display:none;width:100%">
      <div class="queue-status">
        <div class="queue-spinner"></div>
        <div class="queue-txt">配對中…</div>
        <div class="queue-cnt" id="queue-count">等待玩家加入</div>
      </div>
      <button class="btn-ghost" id="qm-cancel-btn" style="width:100%;margin-top:12px;padding:12px;text-align:center">取消配對</button>
    </div>
  </div>
</div>

<!-- ══ QUEST ══════════════════════════════════════════════════ -->
<div class="screen" id="screen-quest">
  <div class="subhdr">
    <button class="btn-ghost" data-back="screen-main">← 返回</button>
    <div class="sub-title">🪙 每日任務</div>
    <div style="margin-left:auto;font-size:12px;color:var(--txt-d)">琪幣：<span class="qi-val" style="color:var(--gold)">1200</span></div>
  </div>
  <div class="quest-list" id="quest-list-body"></div>
</div>

<!-- ══ LEADERBOARD ════════════════════════════════════════════ -->
<div class="screen" id="screen-leader">
  <div class="subhdr">
    <button class="btn-ghost" data-back="screen-main">← 返回</button>
    <div class="sub-title">🏆 排行榜</div>
    <button class="btn-ghost" id="lb-refresh" style="margin-left:auto" onclick="loadLeaderboard()">重整</button>
  </div>
  <div class="lb-list" id="lb-list"></div>
</div>

<!-- ══ FRIEND ROOM ════════════════════════════════════════════ -->
<div class="screen" id="screen-friend">
  <div class="subhdr">
    <button class="btn-ghost" data-back="screen-main">← 返回</button>
    <div class="sub-title">🀅 好友桌</div>
  </div>
  <div class="friend-body">
    <div class="sec-card">
      <div class="sec-lbl">選擇模式</div>
      <div class="mode-opts">
        <div class="mode-opt"><input type="checkbox" class="mode-checkbox" id="mode-2p" value="2p"><label for="mode-2p">二人麻將（香港規則）</label><span class="m-badge">2人</span></div>
        <div class="mode-opt"><input type="checkbox" class="mode-checkbox" id="mode-4p" value="4p"><label for="mode-4p">普通麻將</label><span class="m-badge">4人</span></div>
      </div>
    </div>
    <button class="btn-jade" id="create-room-btn" disabled>建 立 房 間</button>
    <div id="room-code-section" style="display:none;display:flex;flex-direction:column;gap:12px">
      <div class="code-box">
        <div class="code-lbl">房間代碼</div>
        <div class="code-val" id="room-code-display">----</div>
        <div class="wait-row">等待好友加入 <div class="dots"><span></span><span></span><span></span></div></div>
      </div>
      <div class="sec-card">
        <div class="sec-lbl">房間成員</div>
        <div class="pslots" id="player-slots"></div>
      </div>
      <button class="btn-red" id="host-start-btn" disabled>✦ 開 始 對 局 ✦</button>
    </div>
    <div class="div-or">或輸入好友代碼加入</div>
    <div class="join-row">
      <input class="join-inp" id="join-code-input" type="text" maxlength="4" placeholder="代碼" autocomplete="off">
      <button class="btn-join" id="join-btn">加入</button>
    </div>
  </div>
</div>

<!-- ══ GAME ════════════════════════════════════════════════════ -->
<div class="screen" id="screen-game">
  <div class="game-wrap">
    <div id="game-board" style="width:100%;height:100%;position:relative"></div>
  </div>
</div>

<!-- ══ GAME OVER OVERLAY ══════════════════════════════════════ -->
<div class="overlay" id="overlay-gameover">
  <div class="modal" style="text-align:center">
    <div class="modal-title" id="go-title">對局結束</div>
    <div class="modal-sub" id="go-sub"></div>
    <div class="modal-hands" id="go-hands"></div>
    <div class="modal-btns">
      <button class="btn-jade" id="go-replay">再來一局</button>
      <button class="btn-ghost" id="go-exit" style="width:100%;padding:12px;text-align:center">返回大廳</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
