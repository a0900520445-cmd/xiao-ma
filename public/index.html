<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🍋 水果大戰爭</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════ -->
<section id="screen-login" class="screen active">
  <div class="login-card">
    <div class="game-logo">
      <span class="logo-emojis">🥭🍑🍵🍚🍋</span>
      <div class="logo-title">水果大戰爭</div>
      <div class="logo-sub">Fruit Battle War</div>
    </div>
    <div class="form-group">
      <label>玩家名稱</label>
      <input type="text" id="inputUsername" placeholder="輸入你的名字..." maxlength="16"/>
    </div>
    <div class="form-group">
      <label>綁定 Google 帳號</label>
      <input type="email" id="inputGoogle" placeholder="example@gmail.com"/>
    </div>
    <button class="btn btn-primary" id="btnLogin">🎮 開始遊戲</button>
  </div>
</section>

<!-- ══ LOBBY ═══════════════════════════════════════════════════════════ -->
<section id="screen-lobby" class="screen">
  <header class="lobby-header">
    <div class="lobby-logo">🍋 水果大戰爭</div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="coins-display"><span class="coin-icon">🪙</span><span id="coinsDisplay">0</span></div>
      <div class="lobby-player">👤 <span class="name" id="lobbyPlayerName">玩家</span></div>
    </div>
  </header>
  <div class="lobby-body">
    <div class="lobby-banner">
      <span class="banner-emoji">⚔️</span>
      <h2>歡迎來到戰場！</h2>
      <p>選擇模式，開始你的水果大戰吧</p>
    </div>
    <div class="lobby-grid">
      <button class="lobby-btn" id="btnSolo">
        <div class="lb-icon">🤖</div><div class="lb-title">單機模式</div><div class="lb-desc">對抗 AI 電腦</div>
      </button>
      <button class="lobby-btn" id="btnMulti">
        <div class="lb-icon">🌐</div><div class="lb-title">多人模式</div><div class="lb-desc">線上 PvP 對戰</div>
      </button>
      <button class="lobby-btn" id="btnShop">
        <div class="lb-icon">🛒</div><div class="lb-title">商店</div><div class="lb-desc">購買道具</div>
      </button>
      <button class="lobby-btn" id="btnDaily">
        <div class="lb-icon">📅</div><div class="lb-title">每日任務</div><div class="lb-desc">領取每日獎勵</div>
      </button>
    </div>
  </div>
</section>

<!-- ══ QUEUE ════════════════════════════════════════════════════════════ -->
<section id="screen-queue" class="screen">
  <div class="queue-card">
    <div class="queue-title" id="queueTitle">配對大廳</div>
    <div class="queue-spinner"></div>
    <div class="queue-timer" id="queueTimer">0</div>
    <div class="queue-status" id="queueStatus">等待配對中...</div>
    <button class="btn btn-secondary" id="btnLeaveQueue">取消</button>
  </div>
</section>

<!-- ══ GAME ═════════════════════════════════════════════════════════════ -->
<section id="screen-game" class="screen">
  <!-- Top HUD -->
  <div class="game-hud">
    <!-- Left fighter info -->
    <div class="hud-fighter left" id="hudLeft">
      <div class="hud-avatar" id="hudLeftAvatar">🥭</div>
      <div class="hud-info">
        <div class="hud-name" id="hudLeftName">我</div>
        <div class="hud-hp-wrap">
          <div class="hud-hp-bg"><div class="hud-hp-fill" id="hudLeftHp" style="width:100%"></div></div>
          <span class="hud-hp-text" id="hudLeftHpText">300/300</span>
        </div>
        <div class="hud-level" id="hudLeftLevel">Lv.1</div>
      </div>
    </div>

    <!-- Round / wins -->
    <div class="hud-center">
      <div class="hud-round">第<span id="roundNum">1</span>回合</div>
      <div class="hud-wins">
        <div class="win-dot" id="myW1"></div>
        <div class="win-dot" id="myW2"></div>
        <div class="win-dot" id="myW3"></div>
        <span class="vs-sep">VS</span>
        <div class="win-dot" id="opW1"></div>
        <div class="win-dot" id="opW2"></div>
        <div class="win-dot" id="opW3"></div>
      </div>
    </div>

    <!-- Right fighter info -->
    <div class="hud-fighter right" id="hudRight">
      <div class="hud-info" style="align-items:flex-end">
        <div class="hud-name" id="hudRightName">對手</div>
        <div class="hud-hp-wrap">
          <div class="hud-hp-bg"><div class="hud-hp-fill enemy" id="hudRightHp" style="width:100%"></div></div>
          <span class="hud-hp-text" id="hudRightHpText">300/300</span>
        </div>
        <div class="hud-level" id="hudRightLevel">Lv.1</div>
      </div>
      <div class="hud-avatar" id="hudRightAvatar">🍋</div>
    </div>
  </div>

  <!-- Canvas arena -->
  <div class="arena-wrap">
    <canvas id="gameCanvas"></canvas>
    <!-- Effect overlay messages -->
    <div class="arena-msg" id="arenaMsg"></div>
  </div>

  <!-- Bottom controls -->
  <div class="game-bottom">
    <div class="skill-wrap">
      <button class="skill-btn" id="btnSkill">
        <span class="skill-icon">⚡</span>
        <span class="skill-label" id="skillLabel">施放技能</span>
        <div class="skill-cd-ring" id="skillCdRing"></div>
      </button>
      <div class="cd-text" id="cdText"></div>
    </div>
    <div class="battle-log" id="battleLog"></div>
  </div>
</section>

<!-- ══ MODALS ═══════════════════════════════════════════════════════════ -->

<!-- Char Select -->
<div class="modal-overlay" id="modalCharSelect">
  <div class="modal">
    <h2>🎭 選擇角色</h2>
    <div class="char-grid" id="charGrid"></div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-secondary" id="btnCharCancel" style="flex:1">取消</button>
      <button class="btn btn-primary"   id="btnCharConfirm" style="flex:2">✅ 確定出戰</button>
    </div>
  </div>
</div>

<!-- Shop -->
<div class="modal-overlay" id="modalShop">
  <div class="modal" style="position:relative">
    <button class="modal-close" id="btnShopClose">✕</button>
    <h2>🛒 商店</h2>
    <div class="shop-updating">
      <span class="update-icon">⚙️</span>
      <p>遊戲正在更新中...</p>
      <p style="font-size:.75rem;margin-top:.5rem;color:#4a3f7a">請稍後再來查看！</p>
    </div>
  </div>
</div>

<!-- Daily -->
<div class="modal-overlay" id="modalDaily">
  <div class="modal" style="position:relative">
    <button class="modal-close" id="btnDailyClose">✕</button>
    <h2>📅 每日簽到</h2>
    <div class="daily-grid" id="dailyGrid"></div>
    <button class="btn btn-gold" id="btnClaimDaily" style="width:100%">🪙 領取今日獎勵</button>
    <p id="dailyMsg" style="text-align:center;margin-top:.75rem;font-size:.85rem;color:var(--muted)"></p>
  </div>
</div>

<!-- Level Up -->
<div class="modal-overlay" id="modalLevelUp">
  <div class="modal level-up-modal">
    <div class="lv-emoji">⬆️</div>
    <h3>技能升級！</h3>
    <p>你贏得了強化機會！<br>傷害+18%、CD縮短、血量恢復</p>
    <button class="btn btn-gold" id="btnDoLevelUp" style="width:100%">🚀 立即升級！</button>
  </div>
</div>

<!-- Result -->
<div class="modal-overlay" id="modalResult">
  <div class="modal result-modal">
    <span class="result-emoji" id="resultEmoji">🏆</span>
    <div class="result-title" id="resultTitle">勝利！</div>
    <div class="result-desc"  id="resultDesc">恭喜你！</div>
    <div class="result-coins" id="resultCoins" style="display:none">🪙 獲得 50 華幣！</div>
    <button class="btn btn-primary" id="btnBackLobby" style="width:100%">🏠 回到大廳</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
